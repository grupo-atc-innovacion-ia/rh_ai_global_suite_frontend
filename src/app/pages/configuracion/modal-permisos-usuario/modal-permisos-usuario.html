<div class="dialog-header">
  <div class="dialog-header-icon"><mat-icon>security</mat-icon></div>
  <div class="dialog-title-block">
    <h2>Permisos de Usuario</h2>
    <p>{{ nombreUsuario }}</p>
  </div>
</div>

<div class="dialog-divider"></div>

<div class="dialog-body">
  <div class="grupo-permisos" *ngFor="let grupo of grupos">
    <div class="grupo-header">
      <mat-icon>{{ grupo.icono }}</mat-icon>
      <span>{{ grupo.modulo }}</span>
    </div>
    <div class="grupo-checks">
      <mat-checkbox
        *ngFor="let perm of grupo.permisos"
        [(ngModel)]="perm.activo"
        color="warn">
        {{ perm.label }}
      </mat-checkbox>
    </div>
  </div>
</div>

<div class="dialog-actions">
  <button class="btn-cancel" (click)="cancelar()">Cancelar</button>
  <button class="btn-guardar" (click)="guardar()" [disabled]="guardando">
    <mat-icon>save</mat-icon>
    {{ guardando ? 'Guardando...' : 'Guardar Permisos' }}
  </button>
</div>
